services:
  - type: web
    name: verify-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: AUDIENCE
        value: "tds-xxxxxxxx.apps.exam.local"
      - key: PUBLIC_KEY
        value: |                              # ← paste full PEM key from panel
          -----BEGIN PUBLIC KEY-----
          MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEA...
          -----END PUBLIC KEY-----